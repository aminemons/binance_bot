<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>binance_bot dashboard</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background:#0d1117; color:#c9d1d9; margin:0; padding:16px; }
  h1 { font-size:18px; margin:0 0 12px; color:#58a6ff; }
  h2 { font-size:13px; margin:0 0 8px; color:#8b949e; letter-spacing:.05em; text-transform:uppercase; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:6px; padding:12px; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th, td { padding:4px 8px; text-align:left; border-bottom:1px solid #21262d; }
  th { color:#8b949e; font-weight:500; }
  .pos { color:#3fb950; } .neg { color:#f85149; } .muted { color:#6e7681; }
  .pill { display:inline-block; padding:2px 6px; border-radius:10px; font-size:11px; background:#21262d; }
  .pill.paused { background:#5d1f1f; color:#ffb4b4; }
  .pill.live { background:#1f4d2f; color:#9fffb4; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .meta { font-size:12px; color:#8b949e; }
  .scroll { max-height:340px; overflow:auto; }
</style>
</head>
<body>
<div class="header">
  <h1>binance_bot - Binance Spot Testnet</h1>
  <div class="meta" id="meta">connecting...</div>
</div>

<div class="grid">
  <div class="card">
    <h2>Open Positions</h2>
    <div class="scroll"><table id="positions"><thead><tr>
      <th>pair</th><th>strategy</th><th>side</th><th>qty</th><th>entry</th><th>last</th><th>uPnL</th><th>uPnL %</th>
    </tr></thead><tbody></tbody></table></div>
  </div>

  <div class="card">
    <h2>P&amp;L per Pair</h2>
    <table id="pnl"><thead><tr>
      <th>pair</th><th>closed</th><th>today</th><th>all-time</th>
    </tr></thead><tbody></tbody></table>
  </div>

  <div class="card">
    <h2>Win Rate</h2>
    <div id="winrate"></div>
    <h2 style="margin-top:12px;">By Strategy</h2>
    <table id="wrstrat"><thead><tr>
      <th>strategy</th><th>wins</th><th>losses</th><th>total</th><th>win %</th>
    </tr></thead><tbody></tbody></table>
  </div>

  <div class="card">
    <h2>Trade Log (last 50)</h2>
    <div class="scroll"><table id="trades"><thead><tr>
      <th>id</th><th>pair</th><th>strat</th><th>side</th><th>entry</th><th>exit</th><th>pnl</th><th>status</th>
    </tr></thead><tbody></tbody></table></div>
  </div>
</div>

<script>
const $ = (sel) => document.querySelector(sel);
function pn(n, d=4) { if (n==null||isNaN(n)) return '-'; return Number(n).toFixed(d); }
function pct(n) { if (n==null||isNaN(n)) return '-'; return (Number(n)*100).toFixed(3)+'%'; }
function cls(n) { if (n==null||isNaN(n)) return 'muted'; return n>0?'pos':(n<0?'neg':'muted'); }

function render(s) {
  const base = s.risk.base_equity;
  const dailyPct = (s.risk.daily_pnl_pct*100).toFixed(2);
  const pausedPill = s.risk.paused ? '<span class="pill paused">PAUSED</span>' : '<span class="pill live">LIVE</span>';
  $('#meta').innerHTML = `${pausedPill} equity ${base?base.toFixed(2):'-'} USDT &middot; today ${dailyPct}% &middot; size ${s.risk.position_size_usd?.toFixed(2)} USDT &middot; ${new Date(s.ts).toLocaleTimeString()}`;

  const pos = s.open_positions.map(p => `<tr>
    <td>${p.pair}</td><td>${p.strategy}</td><td>${p.side}</td>
    <td>${pn(p.qty,6)}</td><td>${pn(p.entry_price)}</td><td>${pn(p.last_price)}</td>
    <td class="${cls(p.unrealized_pnl)}">${pn(p.unrealized_pnl,4)}</td>
    <td class="${cls(p.unrealized_pnl_pct)}">${p.unrealized_pnl_pct!=null?p.unrealized_pnl_pct.toFixed(3)+'%':'-'}</td>
  </tr>`).join('') || '<tr><td colspan="8" class="muted">no open positions</td></tr>';
  $('#positions tbody').innerHTML = pos;

  const allPairsMap = Object.fromEntries(s.pnl_by_pair.map(r => [r.pair, r]));
  const pnlRows = s.pairs.map(pair => {
    const r = allPairsMap[pair] || { closed_count:0, realized_pnl_today:0, realized_pnl:0 };
    return `<tr>
      <td>${pair}</td><td>${r.closed_count||0}</td>
      <td class="${cls(r.realized_pnl_today)}">${pn(r.realized_pnl_today||0,4)}</td>
      <td class="${cls(r.realized_pnl)}">${pn(r.realized_pnl||0,4)}</td>
    </tr>`;
  }).join('');
  $('#pnl tbody').innerHTML = pnlRows;

  const w = s.win_rate || {wins:0,losses:0,total:0};
  const rate = w.total ? ((w.wins/w.total)*100).toFixed(1) : '-';
  $('#winrate').innerHTML = `<div style="font-size:24px;">${rate}%</div><div class="muted">${w.wins} wins / ${w.losses} losses / ${w.total} total</div>`;

  $('#wrstrat tbody').innerHTML = (s.win_rate_by_strategy||[]).map(r => {
    const rate = r.total ? ((r.wins/r.total)*100).toFixed(1)+'%' : '-';
    return `<tr><td>${r.strategy}</td><td>${r.wins}</td><td>${r.losses}</td><td>${r.total}</td><td>${rate}</td></tr>`;
  }).join('') || '<tr><td colspan="5" class="muted">no closed trades</td></tr>';

  $('#trades tbody').innerHTML = (s.recent_trades||[]).map(t => `<tr>
    <td>${t.id}</td><td>${t.pair}</td><td>${t.strategy}</td><td>${t.side}</td>
    <td>${pn(t.entry_price)}</td><td>${pn(t.exit_price)}</td>
    <td class="${cls(t.pnl)}">${pn(t.pnl,4)}</td><td>${t.status}</td>
  </tr>`).join('') || '<tr><td colspan="8" class="muted">no trades yet</td></tr>';
}

const es = new EventSource('/events');
es.onmessage = (ev) => { try { render(JSON.parse(ev.data)); } catch (e) {} };
es.onerror = () => { $('#meta').textContent = 'SSE disconnected, retrying...'; };
</script>
</body>
</html>
